<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>UCSD WVB · Lineup Builder</title>

<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/papaparse@5.4.1/papaparse.min.js"></script>

<style>
:root {
  --navy:    #002147;
  --navy2:   #00264f;
  --gold:    #C69214;
  --gold2:   #e8aa1a;
  --blue:    #00629B;
  --bg:      #0b1724;
  --surf:    #0f2035;
  --surf2:   #152840;
  --border:  #1c3550;
  --text:    #dce8f5;
  --muted:   #5a7a99;
  --dim:     #2a4560;
  --green:   #22c55e;
  --amber:   #fbbf24;
  --red:     #f87171;
  --purple:  #a78bfa;
}

* { box-sizing: border-box; margin: 0; padding: 0; }

body {
  font-family: 'DM Sans', sans-serif;
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
  overflow-x: hidden;
}

/* ── HEADER ── */
header {
  background: var(--navy);
  border-bottom: 1px solid var(--border);
  padding: 0 2rem;
  height: 58px;
  display: flex;
  align-items: center;
  justify-content: space-between;
}

.brand {
  font-family: 'Bebas Neue', sans-serif;
  font-size: 1.4rem;
  color: var(--gold);
  letter-spacing: .06em;
}

.brand span {
  color: rgba(255,255,255,.5);
  font-size: .9rem;
  margin-left: .5rem;
  letter-spacing: .12em;
}

.avg-chip {
  font-size: .75rem;
  color: var(--muted);
  background: rgba(198,146,20,.08);
  border: 1px solid rgba(198,146,20,.2);
  border-radius: 20px;
  padding: .25rem .9rem;
}

.avg-chip strong { color: var(--gold); }

/* ── SCORE DISPLAY ── */
.score-bar {
  position: sticky;
  top: 0;
  z-index: 100;
  background: var(--navy2);
  border-bottom: 1px solid var(--border);
  padding: 1.4rem 2rem;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 2.5rem;
  transition: background .3s;
}

.score-bar.has-result { background: var(--navy); }

.score-main {
  text-align: center;
}

.score-pct {
  font-family: 'Bebas Neue', sans-serif;
  font-size: 4.5rem;
  line-height: 1;
  letter-spacing: .02em;
  color: var(--dim);
  transition: color .3s, transform .2s;
}

.score-pct.lit { transform: scale(1.04); }

.score-label {
  font-size: .68rem;
  font-weight: 600;
  letter-spacing: .14em;
  text-transform: uppercase;
  color: var(--muted);
  margin-top: .15rem;
}

.score-meta {
  font-size: .78rem;
  color: var(--muted);
  min-height: 1.1rem;
  text-align: center;
  margin-top: .25rem;
}

.score-meta strong { color: var(--text); }

.score-context {
  display: flex;
  flex-direction: column;
  gap: .5rem;
}

.ctx-chip {
  font-size: .75rem;
  padding: .3rem .85rem;
  border-radius: 20px;
  background: var(--surf2);
  border: 1px solid var(--border);
  color: var(--muted);
  white-space: nowrap;
}

.ctx-chip.selected {
  border-color: var(--gold);
  color: var(--gold);
  background: rgba(198,146,20,.08);
}

.vs-avg {
  font-size: .8rem;
  color: var(--muted);
  text-align: center;
}

.vs-avg.above { color: var(--green); }
.vs-avg.below { color: var(--red); }

/* ── CLEAR BTN ── */
.clear-btn {
  position: absolute;
  right: 2rem;
  background: transparent;
  border: 1px solid var(--border);
  border-radius: 8px;
  color: var(--muted);
  font-family: 'DM Sans', sans-serif;
  font-size: .75rem;
  padding: .4rem .85rem;
  cursor: pointer;
  transition: all .15s;
}

.clear-btn:hover {
  border-color: var(--red);
  color: var(--red);
}

/* ── COLUMNS LAYOUT ── */
.columns {
  display: grid;
  grid-template-columns: 0.75fr 1fr 1fr 1fr;
  gap: 0;
  min-height: calc(100vh - 58px - 120px);
}

.col {
  border-right: 1px solid var(--border);
  padding: 1.5rem 1.25rem;
}

.col:last-child { border-right: none; }

.col-header {
  display: flex;
  align-items: center;
  gap: .65rem;
  margin-bottom: 1.25rem;
  padding-bottom: 1rem;
  border-bottom: 1px solid var(--border);
}

.col-icon {
  width: 32px;
  height: 32px;
  border-radius: 8px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: .85rem;
  flex-shrink: 0;
}

.col-icon.rotation { background: rgba(167,139,250,.13); }
.col-icon.passer   { background: rgba(0,98,155,.18); }
.col-icon.setter   { background: rgba(198,146,20,.15); }
.col-icon.hitter   { background: rgba(34,197,94,.12); }

.col-title {
  font-family: 'Bebas Neue', sans-serif;
  font-size: 1.1rem;
  letter-spacing: .06em;
}

.col-title.rotation { color: var(--purple); }
.col-title.passer   { color: #5ab4f5; }
.col-title.setter   { color: var(--gold); }
.col-title.hitter   { color: var(--green); }

.col-sub {
  font-size: .68rem;
  color: var(--muted);
  margin-left: auto;
  text-align: right;
  line-height: 1.4;
}

/* ── PLAYER CARDS ── */
.player-list {
  display: flex;
  flex-direction: column;
  gap: .5rem;
}

.pcard {
  display: flex;
  align-items: center;
  gap: .85rem;
  padding: .75rem .9rem;
  border-radius: 10px;
  border: 1.5px solid var(--border);
  background: var(--surf);
  cursor: pointer;
  transition: all .15s;
  position: relative;
  overflow: hidden;
}

.pcard::before {
  content: '';
  position: absolute;
  left: 0; top: 0; bottom: 0;
  width: 3px;
  background: transparent;
  transition: background .15s;
}

.pcard:hover {
  border-color: var(--blue);
  background: var(--surf2);
}

.pcard:hover::before { background: var(--blue); }

.pcard.selected { background: var(--surf2); }

.pcard.selected.rotation-sel { border-color: var(--purple); }
.pcard.selected.passer-sel   { border-color: #5ab4f5; }
.pcard.selected.setter-sel   { border-color: var(--gold); }
.pcard.selected.hitter-sel   { border-color: var(--green); }

.pcard.selected.rotation-sel::before { background: var(--purple); }
.pcard.selected.passer-sel::before   { background: #5ab4f5; }
.pcard.selected.setter-sel::before   { background: var(--gold); }
.pcard.selected.hitter-sel::before   { background: var(--green); }

.avatar {
  width: 42px;
  height: 42px;
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
  font-family: 'Bebas Neue', sans-serif;
  font-size: 1rem;
  flex-shrink: 0;
  transition: all .15s;
  overflow: hidden;
}

.avatar img {
  width: 100%;
  height: 100%;
  object-fit: cover;
  border-radius: 50%;
  display: block;
}

.avatar.rotation { background: linear-gradient(135deg, #31205f, #5b3aaa); color: var(--purple); }
.avatar.passer   { background: linear-gradient(135deg, #003d6b, #00629B); color: #5ab4f5; }
.avatar.setter   { background: linear-gradient(135deg, #4a3200, #8a5800); color: var(--gold2); }
.avatar.hitter   { background: linear-gradient(135deg, #0a3320, #0f5a30); color: var(--green); }

.pcard-info { flex: 1; min-width: 0; }

.pcard-name {
  font-size: .84rem;
  font-weight: 600;
  color: var(--text);
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}

.pcard-stat {
  font-size: .7rem;
  color: var(--muted);
  margin-top: .15rem;
}

.pcard-rate {
  font-family: 'Bebas Neue', sans-serif;
  font-size: 1.3rem;
  flex-shrink: 0;
  transition: color .15s;
}

.rate-na {
  color: var(--muted);
  font-size: 1rem;
}

.check-icon {
  display: none;
  width: 18px;
  height: 18px;
  border-radius: 50%;
  align-items: center;
  justify-content: center;
  font-size: .6rem;
  font-weight: 700;
  flex-shrink: 0;
}

.pcard.selected .check-icon { display: flex; }

.pcard.selected.rotation-sel .check-icon { background: var(--purple); color: var(--navy); }
.pcard.selected.passer-sel .check-icon   { background: #5ab4f5; color: var(--navy); }
.pcard.selected.setter-sel .check-icon   { background: var(--gold); color: var(--navy); }
.pcard.selected.hitter-sel .check-icon   { background: var(--green); color: var(--navy); }

/* ── HITTER NOTE ── */
.hitter-note {
  font-size: .72rem;
  color: var(--muted);
  text-align: center;
  padding: 1.5rem 1rem;
  border: 1px dashed var(--border);
  border-radius: 10px;
  line-height: 1.5;
  display: none;
}

.hitter-note.visible { display: block; }

/* ── RATE COLOR CLASSES ── */
.rate-hot  { color: var(--green); }
.rate-warm { color: #4ade80; }
.rate-mid  { color: var(--amber); }
.rate-cool { color: var(--red); }

@media (max-width: 1000px) {
  .columns { grid-template-columns: 1fr 1fr; }
}

@media (max-width: 700px) {
  .columns { grid-template-columns: 1fr; }
  .col { border-right: none; border-bottom: 1px solid var(--border); }
  .score-pct { font-size: 3rem; }
  .score-bar { flex-wrap: wrap; gap: .75rem; }
}
</style>
</head>

<body>

<header>
  <div class="brand">UCSD WVB <span>LINEUP BUILDER</span></div>
  <div class="avg-chip">Team avg: <strong id="teamAvg">—</strong></div>
</header>

<!-- LIVE SCORE BAR -->
<div class="score-bar" id="scoreBar">
  <div class="score-context" id="ctxLeft">
    <div class="ctx-chip" id="ctxRotation">Rotation: —</div>
    <div class="ctx-chip" id="ctxPasser">Passer: —</div>
  </div>

  <div class="score-main">
    <div class="score-pct" id="scorePct">—</div>
    <div class="score-label">Expected Side-Out %</div>
    <div class="score-meta" id="scoreMeta">Loading CSV data...</div>
    <div class="vs-avg" id="vsAvg"></div>
  </div>

  <div class="score-context" id="ctxRight">
    <div class="ctx-chip" id="ctxSetter">Setter: —</div>
    <div class="ctx-chip" id="ctxHitter">Hitter: —</div>
    <div class="ctx-chip" id="ctxRec">Receptions: —</div>
  </div>

  <button class="clear-btn" onclick="clearAll()">✕ Reset</button>
</div>

<!-- FOUR COLUMNS -->
<div class="columns">

  <!-- ROTATION -->
  <div class="col">
    <div class="col-header">
      <div class="col-icon rotation">↻</div>
      <div>
        <div class="col-title rotation">Rotation</div>
      </div>
      <div class="col-sub">Optional</div>
    </div>
    <div class="player-list" id="rotationList"></div>
  </div>

  <!-- PASSER -->
  <div class="col">
    <div class="col-header">
      <div class="col-icon passer">🫳</div>
      <div>
        <div class="col-title passer">Passer</div>
      </div>
      <div class="col-sub">All players</div>
    </div>
    <div class="player-list" id="passerList"></div>
  </div>

  <!-- SETTER -->
  <div class="col">
    <div class="col-header">
      <div class="col-icon setter">🎯</div>
      <div>
        <div class="col-title setter">Setter</div>
      </div>
      <div class="col-sub">Optional</div>
    </div>
    <div class="player-list" id="setterList"></div>
  </div>

  <!-- HITTER -->
  <div class="col">
    <div class="col-header">
      <div class="col-icon hitter">⚡</div>
      <div>
        <div class="col-title hitter">Hitter</div>
      </div>
      <div class="col-sub">Requires passer + setter</div>
    </div>

    <div class="hitter-note visible" id="hitterNote">
      Select a passer &amp; setter first to see<br>available hitter combinations
    </div>

    <div class="player-list" id="hitterList"></div>
  </div>

</div>

<script>
/* -------------------------------------------------------
   CSV FILE PATHS
------------------------------------------------------- */

const FILES = {
  passerSetter: "data/passer_setter_xso.csv",
  setter: "data/setter_xso.csv",
  setterHitter: "data/setter_hitter_xso.csv",
  passerSetterHitter: "data/passer_setter_hitter_xso_all_combinations.csv",

  hitterGivenRotation: "data/hitter_given_rotation_expected_sideout.csv",
  setterGivenRotation: "data/setter_given_rotation_expected_sideout.csv",
  setterHitterGivenRotation: "data/setter_hitter_given_rotation_expected_sideout.csv",
  hitterPasserGivenRotation: "data/hitter_passer_given_rotation_expected_sideout.csv",
  passerSetterGivenRotation: "data/passer_setter_given_rotation_expected_sideout.csv",

  rotationSetterHitter: "data/rotation_setter_hitter_xso.csv",
  rotationPasserSetterHitter: "data/rotation_passer_setter_hitter_xso.csv"
};

const TRUE_SETTERS = ["Maija Nepszy", "Mika Rome"];

const ALL_UCSD_PLAYERS = [
  "Alba Canko",
  "Ireland McNees",
  "Iris Canko",
  "Jasmin Saran",
  "Katelyn Hernandez",
  "Katie Rapp",
  "Kayla Uhlick",
  "Lucia Barroso",
  "Madison Johnson",
  "Maija Nepszy",
  "Maria Fernanda Afonso",
  "Marleena Catalan",
  "Mika Rome",
  "Mina Olgar",
  "Molly McCluskey",
  "Paulina Baillie",
  "Stefania Alupei",
  "Zahara Quraishi"
];

const PLAYER_IMAGE_FILES = {
  "Alba Canko": "alba-canko.jpg",
  "Ireland McNees": "ireland-mcnees.jpg",
  "Iris Canko": "iris-canko.jpg",
  "Jasmin Saran": "jasmin-saran.jpg",
  "Jasmine Saran": "jasmin-saran.jpg",
  "Katelyn Hernandez": "katelyn-hernandez.jpg",
  "Katie Rapp": "katie-rapp.jpg",
  "Kayla Uhlick": "kayla-uhlick.jpg",
  "Lucia Barroso": "lucia-barroso.jpg",
  "Madison Johnson": "madison-johnson.jpg",
  "Maija Nepszy": "maija-nepszy.jpg",
  "Maria Fernanda Afonso": "maria-fernanda-afonso.jpg",
  "Marleena Catalan": "marleena-catalan.jpg",
  "Mika Rome": "mika-rome.jpg",
  "Mina Olgar": "mina-olgar.jpg",
  "Molly McCluskey": "molly-mccluskey.jpg",
  "Paulina Baillie": "paulina-baillie.jpg",
  "Stefania Alupei": "stefania-alupei.jpg",
  "Zahara Quraishi": "zahara-quraishi.jpg"
};

let DATA = {};
let TEAM_AVG = 0;

let selRotation = null;
let selPasser = null;
let selSetter = null;
let selHitter = null;

/* -------------------------------------------------------
   LOAD CSV
------------------------------------------------------- */

async function loadCSV(path) {
  const res = await fetch(path);

  if (!res.ok) {
    throw new Error("Could not load " + path);
  }

  const text = await res.text();

  return Papa.parse(text, {
    header: true,
    dynamicTyping: true,
    skipEmptyLines: true
  }).data;
}

async function init() {
  try {
    DATA.passerSetter = await loadCSV(FILES.passerSetter);
    DATA.setter = await loadCSV(FILES.setter);
    DATA.setterHitter = await loadCSV(FILES.setterHitter);
    DATA.passerSetterHitter = await loadCSV(FILES.passerSetterHitter);

    DATA.hitterGivenRotation = await loadCSV(FILES.hitterGivenRotation);
    DATA.setterGivenRotation = await loadCSV(FILES.setterGivenRotation);
    DATA.setterHitterGivenRotation = await loadCSV(FILES.setterHitterGivenRotation);
    DATA.hitterPasserGivenRotation = await loadCSV(FILES.hitterPasserGivenRotation);
    DATA.passerSetterGivenRotation = await loadCSV(FILES.passerSetterGivenRotation);

    DATA.rotationSetterHitter = await loadCSV(FILES.rotationSetterHitter);
    DATA.rotationPasserSetterHitter = await loadCSV(FILES.rotationPasserSetterHitter);

    TEAM_AVG = getOverallAverage();
    document.getElementById("teamAvg").textContent = TEAM_AVG.toFixed(1) + "%";

    buildRotations();
    buildPassers();
    buildSetters();
    buildHitters();

    refreshAll();
  } catch (err) {
    console.error(err);
    document.getElementById("scoreMeta").innerHTML =
      "CSV load error. Check that your files are inside the <strong>data/</strong> folder.";
  }
}

/* -------------------------------------------------------
   HELPERS
------------------------------------------------------- */

function initials(name) {
  return String(name)
    .split(" ")
    .map(w => w[0])
    .slice(0, 2)
    .join("");
}

function cleanName(x) {
  return String(x ?? "").trim();
}

function normalizePlayerName(name) {
  if (name === "Jasmin Saran") return "Jasmine Saran";
  return name;
}

function toNumber(x) {
  const n = Number(x);
  return Number.isFinite(n) ? n : 0;
}

function getXSO(row) {
  if (!row) return 0;
  if (row.xso !== undefined) return toNumber(row.xso);
  if (row.expected_sideout_pct !== undefined) return toNumber(row.expected_sideout_pct);
  return 0;
}

function getN(row) {
  if (!row) return 0;
  if (row.n !== undefined) return toNumber(row.n);
  if (row.receptions !== undefined) return toNumber(row.receptions);
  return 0;
}

function getSideouts(row) {
  if (!row) return 0;
  return toNumber(row.sideouts);
}

function uniqueValues(rows, col) {
  return [...new Set(
    rows
      .map(r => cleanName(r[col]))
      .filter(Boolean)
  )].sort();
}

function playerImagePath(name) {
  const fileName = PLAYER_IMAGE_FILES[name];
  return fileName ? "images/" + fileName : "";
}

function rateColor(v) {
  if (v === null || v === undefined) return "rate-na";
  if (v >= 70) return "rate-hot";
  if (v >= 58) return "rate-warm";
  if (v >= 50) return "rate-mid";
  return "rate-cool";
}

function rateHex(v) {
  if (v >= 70) return "#22c55e";
  if (v >= 58) return "#4ade80";
  if (v >= 50) return "#fbbf24";
  return "#f87171";
}

function aggregate(rows) {
  let n = 0;
  let sideouts = 0;

  rows.forEach(row => {
    n += getN(row);
    sideouts += getSideouts(row);
  });

  if (n === 0) return null;

  return {
    n,
    sideouts,
    xso: sideouts / n * 100
  };
}

function getOverallAverage() {
  const agg = aggregate(DATA.setter);
  return agg ? agg.xso : 0;
}

/* -------------------------------------------------------
   BUILD COLUMNS
------------------------------------------------------- */

function buildRotations() {
  const list = document.getElementById("rotationList");
  list.innerHTML = "";

  const rotations = [...new Set([
    ...uniqueValues(DATA.setterGivenRotation, "rotation"),
    ...uniqueValues(DATA.hitterGivenRotation, "rotation"),
    ...uniqueValues(DATA.rotationPasserSetterHitter, "rotation")
  ])].sort((a, b) => Number(a) - Number(b));

  rotations.forEach(rot => {
    const rows = DATA.setterGivenRotation.filter(x =>
      String(x.rotation) === String(rot)
    );

    const st = aggregate(rows);
    const xso = st ? st.xso : null;
    const n = st ? st.n : 0;

    const card = makeCard("Rotation " + rot, "rotation", xso, n + " receptions");
    card.setAttribute("data-rotation", rot);
    card.addEventListener("click", () => selectRotation(rot));
    list.appendChild(card);
  });
}

function buildPassers() {
  const list = document.getElementById("passerList");
  list.innerHTML = "";

  ALL_UCSD_PLAYERS.forEach(name => {
    const dataName = normalizePlayerName(name);

    const rows = DATA.passerSetter.filter(x =>
      x.passer === dataName
    );

    const st = aggregate(rows);

    let card;

    if (!st) {
      card = makeCard(name, "passer", null, "No passing data");
    } else {
      card = makeCard(name, "passer", st.xso, st.n + " receptions");
    }

    card.addEventListener("click", () => selectPasser(name));
    list.appendChild(card);
  });
}

function buildSetters() {
  const list = document.getElementById("setterList");
  list.innerHTML = "";

  TRUE_SETTERS.forEach(name => {
    const row = DATA.setter.find(x => x.setter_group === name);

    if (!row) {
      const card = makeCard(name, "setter", null, "No setting data");
      card.addEventListener("click", () => selectSetter(name));
      list.appendChild(card);
      return;
    }

    const xso = getXSO(row);
    const n = getN(row);

    const card = makeCard(name, "setter", xso, n + " receptions");
    card.addEventListener("click", () => selectSetter(name));
    list.appendChild(card);
  });
}

function buildHitters() {
  const list = document.getElementById("hitterList");
  const note = document.getElementById("hitterNote");

  list.innerHTML = "";

  if (!selPasser || !selSetter) {
    note.classList.add("visible");
    note.innerHTML =
      "Select a passer &amp; setter first to see<br>available hitter combinations";
    return;
  }

  const dataPasser = normalizePlayerName(selPasser);

  let combos = [];

  if (selRotation) {
    combos = DATA.rotationPasserSetterHitter
      .filter(row =>
        String(row.rotation) === String(selRotation) &&
        row.passer === dataPasser &&
        row.setter_group === selSetter
      )
      .sort((a, b) => getXSO(b) - getXSO(a));
  } else {
    combos = DATA.passerSetterHitter
      .filter(row =>
        row.passer === dataPasser &&
        row.setter_group === selSetter
      )
      .sort((a, b) => getXSO(b) - getXSO(a));
  }

  if (!combos.length) {
    note.classList.add("visible");
    note.innerHTML =
      "No hitter combinations found for this<br>passer, setter, and rotation.";
    return;
  }

  note.classList.remove("visible");

  combos.forEach(row => {
    const hitter = row.hitter;
    const xso = getXSO(row);
    const n = getN(row);
    const sideouts = getSideouts(row);

    const displayHitter = hitter === "Jasmine Saran" ? "Jasmin Saran" : hitter;

    const card = makeCard(
      displayHitter,
      "hitter",
      xso,
      n + " recs · " + sideouts + " sideouts"
    );

    card.addEventListener("click", () => selectHitter(displayHitter));
    list.appendChild(card);
  });
}

function makeCard(name, role, xso, sub) {
  const div = document.createElement("div");
  div.className = "pcard";
  div.setAttribute("data-name", name);

  let avatarContent = "";

  if (role === "rotation") {
    avatarContent = "R";
  } else {
    const imgPath = playerImagePath(name);

    avatarContent = `
      <img 
        src="${imgPath}" 
        alt="${name}"
        onerror="this.style.display='none'; this.parentElement.textContent='${initials(name)}';"
      >
    `;
  }

  const rateDisplay =
    xso === null || xso === undefined
      ? "N/A"
      : xso.toFixed(1) + "%";

  const rateClass =
    xso === null || xso === undefined
      ? "rate-na"
      : rateColor(xso);

  div.innerHTML = `
    <div class="avatar ${role}">${avatarContent}</div>
    <div class="pcard-info">
      <div class="pcard-name">${name}</div>
      <div class="pcard-stat">${sub}</div>
    </div>
    <div class="pcard-rate ${rateClass}">${rateDisplay}</div>
    <div class="check-icon">✓</div>
  `;

  return div;
}

/* -------------------------------------------------------
   SELECTION LOGIC
------------------------------------------------------- */

function selectRotation(rot) {
  selRotation = String(selRotation) === String(rot) ? null : rot;
  selHitter = null;
  refreshAll();
}

function selectPasser(name) {
  selPasser = selPasser === name ? null : name;
  selHitter = null;
  refreshAll();
}

function selectSetter(name) {
  selSetter = selSetter === name ? null : name;
  selHitter = null;
  refreshAll();
}

function selectHitter(name) {
  selHitter = selHitter === name ? null : name;
  refreshAll();
}

function clearAll() {
  selRotation = null;
  selPasser = null;
  selSetter = null;
  selHitter = null;
  refreshAll();
}

function refreshAll() {
  highlightRotations();
  highlightPassers();
  highlightSetters();

  buildHitters();
  highlightHitters();

  refreshScore();
}

/* -------------------------------------------------------
   HIGHLIGHTING
------------------------------------------------------- */

function highlightRotations() {
  document.querySelectorAll("#rotationList .pcard").forEach(card => {
    const rot = card.getAttribute("data-rotation");
    card.classList.toggle("selected", String(rot) === String(selRotation));
    card.classList.toggle("rotation-sel", String(rot) === String(selRotation));
  });
}

function highlightPassers() {
  document.querySelectorAll("#passerList .pcard").forEach(card => {
    const name = card.getAttribute("data-name");
    card.classList.toggle("selected", name === selPasser);
    card.classList.toggle("passer-sel", name === selPasser);
  });
}

function highlightSetters() {
  document.querySelectorAll("#setterList .pcard").forEach(card => {
    const name = card.getAttribute("data-name");
    card.classList.toggle("selected", name === selSetter);
    card.classList.toggle("setter-sel", name === selSetter);
  });
}

function highlightHitters() {
  document.querySelectorAll("#hitterList .pcard").forEach(card => {
    const name = card.getAttribute("data-name");
    card.classList.toggle("selected", name === selHitter);
    card.classList.toggle("hitter-sel", name === selHitter);
  });
}

/* -------------------------------------------------------
   LOOKUP LOGIC
------------------------------------------------------- */

function findResult() {
  const hasR = !!selRotation;
  const hasP = !!selPasser;
  const hasS = !!selSetter;
  const hasH = !!selHitter;

  const dataPasser = normalizePlayerName(selPasser);
  const dataHitter = normalizePlayerName(selHitter);

  let row = null;
  let source = "";

  if (hasR && hasP && hasS && hasH) {
    row = DATA.rotationPasserSetterHitter.find(x =>
      String(x.rotation) === String(selRotation) &&
      x.passer === dataPasser &&
      x.setter_group === selSetter &&
      x.hitter === dataHitter
    );
    source = "rotation_passer_setter_hitter_xso.csv";
  }

  else if (hasP && hasS && hasH) {
    row = DATA.passerSetterHitter.find(x =>
      x.passer === dataPasser &&
      x.setter_group === selSetter &&
      x.hitter === dataHitter
    );
    source = "passer_setter_hitter_xso_all_combinations.csv";
  }

  else if (hasR && hasS && hasH) {
    row = DATA.rotationSetterHitter.find(x =>
      String(x.rotation) === String(selRotation) &&
      x.setter_group === selSetter &&
      x.hitter === dataHitter
    );
    source = "rotation_setter_hitter_xso.csv";
  }

  else if (hasS && hasH) {
    row = DATA.setterHitter.find(x =>
      x.setter_group === selSetter &&
      x.hitter === dataHitter
    );
    source = "setter_hitter_xso.csv";
  }

  else if (hasR && hasP && hasS) {
    row = DATA.passerSetterGivenRotation.find(x =>
      String(x.rotation) === String(selRotation) &&
      x.passer === dataPasser &&
      x.setter_group === selSetter
    );
    source = "passer_setter_given_rotation_expected_sideout.csv";
  }

  else if (hasP && hasS) {
    row = DATA.passerSetter.find(x =>
      x.passer === dataPasser &&
      x.setter_group === selSetter
    );
    source = "passer_setter_xso.csv";
  }

  else if (hasR && hasP && hasH) {
    row = DATA.hitterPasserGivenRotation.find(x =>
      String(x.rotation) === String(selRotation) &&
      x.passer === dataPasser &&
      x.hitter === dataHitter
    );
    source = "hitter_passer_given_rotation_expected_sideout.csv";
  }

  else if (hasR && hasS) {
    row = DATA.setterGivenRotation.find(x =>
      String(x.rotation) === String(selRotation) &&
      x.setter_group === selSetter
    );
    source = "setter_given_rotation_expected_sideout.csv";
  }

  else if (hasR && hasH) {
    row = DATA.hitterGivenRotation.find(x =>
      String(x.rotation) === String(selRotation) &&
      x.hitter === dataHitter
    );
    source = "hitter_given_rotation_expected_sideout.csv";
  }

  else if (hasS) {
    row = DATA.setter.find(x =>
      x.setter_group === selSetter
    );
    source = "setter_xso.csv";
  }

  else if (hasH) {
    row = aggregate(DATA.setterHitter.filter(x =>
      x.hitter === dataHitter
    ));
    source = "setter_hitter_xso.csv";
  }

  else if (hasP) {
    row = aggregate(DATA.passerSetter.filter(x =>
      x.passer === dataPasser
    ));
    source = "passer_setter_xso.csv";
  }

  else if (hasR) {
    row = aggregate(DATA.setterGivenRotation.filter(x =>
      String(x.rotation) === String(selRotation)
    ));
    source = "setter_given_rotation_expected_sideout.csv";
  }

  else {
    row = aggregate(DATA.setter);
    source = "setter_xso.csv";
  }

  return { row, source };
}

/* -------------------------------------------------------
   SCORE DISPLAY
------------------------------------------------------- */

function refreshScore() {
  const pctEl   = document.getElementById("scorePct");
  const metaEl  = document.getElementById("scoreMeta");
  const vsEl    = document.getElementById("vsAvg");
  const bar     = document.getElementById("scoreBar");

  const ctxRot  = document.getElementById("ctxRotation");
  const ctxP    = document.getElementById("ctxPasser");
  const ctxS    = document.getElementById("ctxSetter");
  const ctxH    = document.getElementById("ctxHitter");
  const ctxR    = document.getElementById("ctxRec");

  ctxRot.textContent = selRotation ? "Rotation: " + selRotation : "Rotation: —";
  ctxP.textContent   = selPasser ? "Pass: " + selPasser.split(" ")[0] : "Passer: —";
  ctxS.textContent   = selSetter ? "Set: "  + selSetter.split(" ")[0] : "Setter: —";
  ctxH.textContent   = selHitter ? "Hit: "  + selHitter.split(" ")[0] : "Hitter: —";

  ctxRot.classList.toggle("selected", !!selRotation);
  ctxP.classList.toggle("selected", !!selPasser);
  ctxS.classList.toggle("selected", !!selSetter);
  ctxH.classList.toggle("selected", !!selHitter);

  const result = findResult();
  const row = result.row;

  if (!row) {
    pctEl.textContent = "No Data";
    pctEl.style.fontSize = "2.3rem";
    pctEl.style.color = "var(--muted)";

    metaEl.innerHTML = "No Data on Grouping";
    vsEl.textContent = "";

    ctxR.textContent = "Receptions: —";
    ctxR.classList.remove("selected");

    bar.classList.add("has-result");
    return;
  }

  const xso = getXSO(row);
  const n = getN(row);
  const sideouts = getSideouts(row);
  const diff = xso - TEAM_AVG;

  pctEl.style.fontSize = "";
  pctEl.textContent = xso.toFixed(1) + "%";
  pctEl.style.color = rateHex(xso);
  pctEl.classList.add("lit");
  setTimeout(() => pctEl.classList.remove("lit"), 200);

  metaEl.innerHTML = buildMetaText(sideouts, n, result.source);

  vsEl.textContent = (diff >= 0 ? "+" : "") + diff.toFixed(1) + "pp vs team avg";
  vsEl.className = "vs-avg " + (diff >= 0 ? "above" : "below");

  ctxR.textContent = n + " receptions";
  ctxR.classList.add("selected");
  bar.classList.add("has-result");
}

function buildMetaText(sideouts, n, source) {
  const parts = [];

  if (selRotation) parts.push(`<strong>R${selRotation}</strong>`);
  if (selPasser) parts.push(`<strong>${selPasser.split(" ")[0]}</strong>`);
  if (selSetter) parts.push(`<strong>${selSetter.split(" ")[0]}</strong>`);
  if (selHitter) parts.push(`<strong>${selHitter.split(" ")[0]}</strong>`);

  const combo = parts.length ? parts.join(" → ") : "Overall true-setter average";

  return `${combo} · ${sideouts}/${n} sideouts · ${source}`;
}

/* -------------------------------------------------------
   INIT
------------------------------------------------------- */

init();
</script>
